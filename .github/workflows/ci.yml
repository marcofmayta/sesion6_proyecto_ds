name: CI Base

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                python-version: ["3.9", "3.10", "3.11"]

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                python-version: ${{ matrix.python-version }}
                cache: "pip"
                cache-dependency-path: requirements.txt
            
            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Linting con flake8
              run: flake8 . --max-line-length=100 --exclude=.git,__pycache__

            - name: Tests con pytest
              run: pytest tests/ -v

    entrenar:
        runs-on: ubuntu-latest
        needs: test

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                python-version: "3.11"
                cache: "pip"
                cache-dependency-path: requirements.txt
            
            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Entrenar modelo y generar reporte
              run: python train_and_evaluate.py

            - name: Subir reporte como artefacto
              uses: actions/upload-artifact@v4
              with:
                name: modelo-y-reporte-${{ github.run_number }}
                path: outputs/
                retention-days: 30

    evaluar:
        runs-on: ubuntu-latest
        needs: entrenar

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                python-version: "3.11"
                cache: "pip"
                cache-dependency-path: requirements.txt
            
            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Descargar modelo entrenado
              uses: actions/download-artifact@v4
              with:
                name: modelo-y-reporte-${{ github.run_number }}
                path: outputs/
            
            - name: Evaluación adicional con validación cruzada
              run: python evaluate_extra.py

            - name: Subir reporte de validación como artefacto
              uses: actions/upload-artifact@v4
              with:
                name: reporte-validacion-${{ github.run_number }}
                path: outputs/reporte_validacion.txt
                retention-days: 30